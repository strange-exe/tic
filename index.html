<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Play Tic Tac Toe online with friends, challenge the unbeatable AI, or play locally. Premium experience with stunning visuals.">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://unpkg.com; connect-src *; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; manifest-src 'self';">

    <title>Tic Tac Toe</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06060f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tic Tac Toe">
    <link rel="apple-touch-icon" href="/asset/icons/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="/asset/icons/icon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="Tic Tac Toe — Play Online">
    <meta property="og:description" content="Challenge friends online or beat the unbeatable AI. Play now at tic.abhinesh.me">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tic.abhinesh.me">

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <main class="app" role="main">
        <!-- ========== MENU ========== -->
        <div id="menu-screen" class="screen active">
            <div class="glass-card menu-card">
                <div class="logo"><span class="logo-x">X</span><span class="logo-o">O</span></div>
                <h1>Tic Tac Toe</h1>
                <p class="subtitle">Choose your mode</p>
                <div class="username-section">
                    <input id="username-input" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <div class="menu-buttons">
                    <button id="btn-pvp" class="btn btn-primary"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Local PvP</button>
                    <button id="btn-ai" class="btn btn-secondary"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="9.5" cy="16" r="1"/><circle cx="14.5" cy="16" r="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><path d="M12 3v1"/></svg>vs AI</button>
                    <button id="btn-online" class="btn btn-accent"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Online</button>
                </div>
            </div>
        </div>

        <!-- ========== LOBBY ========== -->
        <div id="lobby-screen" class="screen">
            <div class="glass-card lobby-card">
                <h2>Online Multiplayer</h2>
                <button id="btn-create" class="btn btn-primary btn-lg">Create Game</button>
                <div id="invite-section" class="invite-section hidden">
                    <p class="invite-label">Share this link with your friend:</p>
                    <div class="invite-input-group">
                        <input id="invite-link" type="text" readonly aria-label="Invite link">
                        <button id="btn-copy" class="btn btn-small">Copy</button>
                    </div>
                    <div id="waiting-section" class="waiting hidden">
                        <div class="spinner"></div>
                        <p>Waiting for opponent…</p>
                    </div>
                </div>
                <div class="divider"><span>OR</span></div>
                <p class="invite-label">Join with a game code:</p>
                <div class="join-input-group">
                    <input id="join-code" type="text" placeholder="e.g. Abhi-A3B7K" autocomplete="off" spellcheck="false">
                    <button id="btn-join" class="btn btn-secondary">Join</button>
                </div>
                <p id="lobby-status" class="lobby-status"></p>
                <button id="btn-back-lobby" class="btn btn-ghost"><svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to Menu</button>
            </div>
        </div>

        <!-- ========== JOIN (invite link landing) ========== -->
        <div id="join-screen" class="screen">
            <div class="glass-card join-card">
                <div class="logo logo-sm"><span class="logo-x">X</span><span class="logo-o">O</span></div>
                <h2>You've been invited!</h2>
                <p class="subtitle">Enter your name to join the game</p>
                <div class="username-section">
                    <input id="join-username-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <button id="btn-join-game" class="btn btn-primary btn-lg">Join Game</button>
                <p id="join-status" class="lobby-status"></p>
            </div>
        </div>

        <!-- ========== GAME ========== -->
        <div id="game-screen" class="screen">
            <div class="glass-card game-card">
                <div class="scoreboard">
                    <div class="score-item x-score"><span id="x-label" class="score-label">Player 1</span><span id="x-wins" class="score-value">0</span></div>
                    <div class="score-item draw-score"><span class="score-label">Draws</span><span id="draws" class="score-value">0</span></div>
                    <div class="score-item o-score"><span id="o-label" class="score-label">Player 2</span><span id="o-wins" class="score-value">0</span></div>
                </div>
                <p id="status" class="status" aria-live="polite">X's Turn</p>

                <div class="board-wrapper">
                    <div id="game-board" class="board" role="grid" aria-label="Tic Tac Toe board"></div>
                    <svg id="win-line" class="win-line-svg" viewBox="0 0 340 340" preserveAspectRatio="xMidYMid meet"></svg>
                </div>

                <div class="game-controls">
                    <button id="restart" class="btn btn-primary"><svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Restart</button>
                    <button id="btn-menu" class="btn btn-ghost"><svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Menu</button>
                </div>

                <!-- Chat (online only) -->
                <div id="chat-panel" class="chat-panel hidden">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span>Chat with <strong id="opponent-name">Opponent</strong></span>
                        </div>
                        <button id="chat-toggle" class="chat-toggle-btn" aria-label="Toggle chat">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                    </div>
                    <div class="chat-body">
                        <div id="chat-messages" class="chat-messages"></div>
                        <div class="chat-input-group">
                            <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" maxlength="200">
                            <button id="btn-send" class="btn btn-send" aria-label="Send message">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="celebration" aria-hidden="true"></div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/ui.js"></script>
    <script src="script.js"></script>
</body>
</html>
